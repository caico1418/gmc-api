version: "3.0"

services:
  db:
    image: postgres:16
    container_name: ${DB_NAME}
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5432:5432
    restart: always
    volumes:
      - ./postgres:/var/lib/postgresql/data